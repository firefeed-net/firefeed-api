version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: postgres-pgvector.Dockerfile
    environment:
      - FIREFEED_DB
      - FIREFEED_DB_USER
      - FIREFEED_DB_PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${FIREFEED_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${FIREFEED_DB}
    environment:
      - REDIS_PASSWORD
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FireFeed API
  firefeed-api:
    build:
      context: .
      target: development
    environment:
      # Database
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${FIREFEED_DB}
      DB_USER: ${FIREFEED_DB_USER}
      DB_PASSWORD: ${FIREFEED_DB_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0

      # API Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_ENVIRONMENT: development
      API_DEBUG: "true"
      API_LOG_LEVEL: debug

      # Security
      SECRET_KEY: your-secret-key-here
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION: 86400

      # Email (optional)
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASSWORD: your-app-password
      SMTP_USE_TLS: "true"

      # External APIs
      OPENAI_API_KEY: your-openai-key
      YANDEX_API_KEY: your-yandex-key
      GOOGLE_TRANSLATE_API_KEY: your-google-key
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data: